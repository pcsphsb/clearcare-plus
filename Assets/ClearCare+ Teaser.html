  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\">Confirmation<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-k=\"s3cap\" style=\"font-size:27px; font-weight:600; letter-spacing:-.3px; text-align:center; color:#5E7C8C; opacity:0;\"><span style=\"color:#0E8C80; font-weight:800;\">Every step that can be AI, is AI.<\u002Fspan> Triage, matching &amp; booking, fully connected.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ SCENE 4 — WHY IT WINS ============ -->\n    <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:60px;\">\n      <div style=\"display:flex; gap:26px;\">\n        <div data-k=\"s4c0\" style=\"display:flex; align-items:center; gap:14px; background:#fff; border:1px solid #E6EFF4; border-radius:999px; padding:18px 30px; box-shadow:0 10px 26px rgba(16,42,58,0.07); opacity:0; transform-origin:center;\">\n          <svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"#14A99B\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4 10-10.5\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:25px; font-weight:700; letter-spacing:-.4px; color:#0E2A3A;\">Single connected flow<\u002Fspan>\n        <\u002Fdiv>\n        <div data-k=\"s4c1\" style=\"display:flex; align-items:center; gap:14px; background:#fff; border:1px solid #E6EFF4; border-radius:999px; padding:18px 30px; box-shadow:0 10px 26px rgba(16,42,58,0.07); opacity:0; transform-origin:center;\">\n          <svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"#14A99B\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4 10-10.5\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:25px; font-weight:700; letter-spacing:-.4px; color:#0E2A3A;\">Fully automated booking<\u002Fspan>\n        <\u002Fdiv>\n        <div data-k=\"s4c2\" style=\"display:flex; align-items:center; gap:14px; background:#fff; border:1px solid #E6EFF4; border-radius:999px; padding:18px 30px; box-shadow:0 10px 26px rgba(16,42,58,0.07); opacity:0; transform-origin:center;\">\n          <svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"#14A99B\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4 10-10.5\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:25px; font-weight:700; letter-spacing:-.4px; color:#0E2A3A;\">Language-first by design<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-k=\"s4stat\" style=\"display:flex; flex-direction:column; align-items:center; gap:20px; opacity:0;\">\n        <div style=\"display:flex; align-items:baseline; gap:14px;\">\n          <span data-k=\"s4num\" style=\"font-size:108px; font-weight:800; letter-spacing:-3px; line-height:1; color:#14A99B;\">{{ count }}<\u002Fspan>\n          <span style=\"font-size:54px; font-weight:700; letter-spacing:-1px; color:#9DB2BD;\">/ 16<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:25px; font-weight:600; letter-spacing:-.3px; color:#5E7C8C;\">process steps already live<\u002Fdiv>\n        <div style=\"width:440px; height:12px; border-radius:6px; background:#DCEAF0; overflow:hidden;\">\n          <div data-k=\"s4bar\" style=\"width:100%; height:100%; border-radius:6px; background:linear-gradient(90deg,#2E80C9,#14A99B); transform-origin:left center; transform:scaleX(0);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ SCENE 5 — THE CLOSE (TEAM) ============ -->\n    <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;\">\n      <div data-k=\"s5logo\" style=\"display:flex; align-items:center; gap:16px; opacity:0; transform-origin:center;\">\n        <div style=\"width:58px; height:58px; border-radius:16px; background:linear-gradient(145deg,#2E80C9,#14A99B); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 24px rgba(20,128,170,0.3); flex:none;\">\n          <svg viewBox=\"0 0 24 24\" width=\"32\" height=\"32\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 6v12M6 12h12\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size:54px; font-weight:800; letter-spacing:-1.8px; line-height:1; color:#0E2A3A;\">ClearCare<span style=\"color:#14A99B;\">+<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-k=\"s5names\" style=\"font-size:40px; font-weight:800; letter-spacing:-1px; color:#0E2A3A; opacity:0; white-space:nowrap;\">Pablo &nbsp;·&nbsp; Devashri &nbsp;·&nbsp; Karim &nbsp;·&nbsp; Darshan &nbsp;·&nbsp; Pat<\u002Fdiv>\n\n      <div data-k=\"s5foot\" style=\"font-size:16px; font-weight:500; line-height:1.5; text-align:center; color:#8AA3B0; opacity:0; max-width:840px;\">AI assisted as a “second engineer”; all process modelling &amp; architecture were student-directed.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ SCENE 6 — SIGN UP (QR, final hold) ============ -->\n    <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:96px; padding:0 150px;\">\n      <div data-k=\"s6text\" style=\"display:flex; flex-direction:column; gap:22px; opacity:0; max-width:660px;\">\n        <div style=\"font-size:19px; font-weight:800; letter-spacing:5px; text-transform:uppercase; color:#14A99B;\">Get started<\u002Fdiv>\n        <div style=\"font-size:66px; font-weight:800; letter-spacing:-2.2px; line-height:1.06; color:#0E2A3A;\">Scan to<br>sign up.<\u002Fdiv>\n        <div style=\"font-size:26px; font-weight:600; letter-spacing:-.4px; line-height:1.42; color:#5E7C8C;\">Find and book your doctor, in your own language.<br>No phone call needed.<\u002Fdiv>\n      <\u002Fdiv>\n      <img data-k=\"s6qr\" src=\"daa7a6c2-98f3-40b7-b2f8-90a9f0bdeec9\" alt=\"ClearCare+ sign-up QR code\" style=\"height:640px; width:auto; opacity:0; transform-origin:center; filter:drop-shadow(0 18px 42px rgba(14,58,77,0.16));\">\n    <\u002Fdiv>\n\n    <!-- replay control -->\n    <button onclick=\"{{ replay }}\" title=\"Play again\" style=\"position:absolute; right:32px; bottom:30px; width:50px; height:50px; border-radius:50%; background:#fff; border:1px solid #E6EFF4; box-shadow:0 6px 18px rgba(16,42,58,0.1); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; z-index:50;\">\n      <svg viewBox=\"0 0 24 24\" width=\"23\" height=\"23\" fill=\"none\" stroke=\"#27485A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 11-2.64-6.36\"><\u002Fpath><path d=\"M21 3.5V9h-5.5\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  stageRef = React.createRef();\n  TOTAL = 36000;\n  state = { count: 0 };\n\n  // count-up window (ms within the timeline)\n  CNT_START = 25900;\n  CNT_END = 27300;\n\n  q(k) {\n    const r = this.stageRef.current;\n    return r ? r.querySelector('[data-k=\"' + k + '\"]') : null;\n  }\n\n  fit = () => {\n    const el = this.stageRef.current;\n    if (!el) return;\n    const w = window.innerWidth || document.documentElement.clientWidth || 0;\n    const h = window.innerHeight || document.documentElement.clientHeight || 0;\n    const s = Math.min(w / 1920, h / 1080);\n    if (!isFinite(s) || s <= 0) {\n      // window not measurable yet — retry on the next frame\n      if (this._fitRetry) cancelAnimationFrame(this._fitRetry);\n      this._fitRetry = requestAnimationFrame(this.fit);\n      return;\n    }\n    el.style.transform = 'scale(' + s + ')';\n  };\n\n  kf(el, frames) {\n    if (!el) return null;\n    const T = this.TOTAL;\n    const keyframes = frames.map((f) => {\n      const k = { offset: Math.max(0, Math.min(1, f.t / T)) };\n      if (f.o != null) k.opacity = f.o;\n      const tr = [];\n      tr.push('translate(' + (f.x || 0) + 'px,' + (f.y || 0) + 'px)');\n      tr.push('scale(' + (f.s != null ? f.s : 1) + ')');\n      k.transform = tr.join(' ');\n      if (f.e) k.easing = f.e;\n      return k;\n    });\n    const a = el.animate(keyframes, { duration: T, iterations: 1, fill: 'both' });\n    this._anims.push(a);\n    return a;\n  }\n\n  appearHold(k, tin, o) {\n    o = o || {};\n    const el = this.q(k);\n    if (!el) return;\n    const inDur = o.inDur || 650;\n    const y0 = o.y != null ? o.y : 18;\n    const s0 = o.s != null ? o.s : 1;\n    this.kf(el, [\n      { t: 0, o: 0, y: y0, s: s0 },\n      { t: tin, o: 0, y: y0, s: s0, e: 'cubic-bezier(.16,.85,.3,1)' },\n      { t: tin + inDur, o: 1, y: 0, s: 1 },\n      { t: this.TOTAL, o: 1, y: 0, s: 1 },\n    ]);\n  }\n\n  appear(k, tin, tout, o) {\n    o = o || {};\n    const el = this.q(k);\n    if (!el) return;\n    const inDur = o.inDur || 600;\n    const outDur = o.outDur || 450;\n    const y0 = o.y != null ? o.y : 18;\n    const yOut = o.yOut != null ? o.yOut : -10;\n    const s0 = o.s != null ? o.s : 1;\n    this.kf(el, [\n      { t: 0, o: 0, y: y0, s: s0 },\n      { t: tin, o: 0, y: y0, s: s0, e: 'cubic-bezier(.16,.85,.3,1)' },\n      { t: tin + inDur, o: 1, y: 0, s: 1 },\n      { t: tout, o: 1, y: 0, s: 1, e: 'cubic-bezier(.4,0,.7,.4)' },\n      { t: tout + outDur, o: 0, y: yOut, s: 1 },\n      { t: this.TOTAL, o: 0, y: yOut, s: 1 },\n    ]);\n  }\n\n  rawAnim(k, keyframes) {\n    const el = this.q(k);\n    if (!el) return null;\n    const a = el.animate(keyframes, { duration: this.TOTAL, iterations: 1, fill: 'both' });\n    this._anims.push(a);\n    return a;\n  }\n\n  build() {\n    if (this._built) return;\n    const root = this.stageRef.current;\n    if (!root) return;\n    this._built = true;\n    this._anims = [];\n    const T = this.TOTAL;\n\n    // background drift (always-in-motion) — also our timeline reference for the counter\n    this.refAnim = this.kf(this.q('bgblob'), [\n      { t: 0, x: 0, y: 0, e: 'ease-in-out' },\n      { t: 18000, x: 46, y: -34, e: 'ease-in-out' },\n      { t: T, x: 0, y: 0 },\n    ]);\n    this.kf(this.q('bgblob2'), [\n      { t: 0, x: 0, y: 0, e: 'ease-in-out' },\n      { t: 18000, x: -38, y: 30, e: 'ease-in-out' },\n      { t: T, x: 0, y: 0 },\n    ]);\n\n    // SCENE 1 — hook\n    this.appear('s1l1', 350, 1850);\n    this.appear('s1l2', 2050, 3500);\n    this.appear('s1l3', 3650, 5100);\n    this.appear('s1l4', 5300, 7900, { inDur: 750, y: 24 });\n\n    // SCENE 2 — turn + reveal\n    this.appear('s2turn', 8400, 11000, { inDur: 700, y: 22 });\n    this.appear('s2logo', 11400, 14200, { inDur: 850, s: 0.9, y: 26 });\n    this.appear('s2tag', 12400, 14200, { inDur: 700, y: 16 });\n\n    // SCENE 3 — how it works (HERO, ~9s)\n    this.appear('s3eye', 14700, 23400, { inDur: 600, y: 12 });\n    // bold self-drawing flow line, full width (15.0s -> 18.5s)\n    this.rawAnim('s3line', [\n      { offset: 0, transform: 'scaleX(0)', opacity: 0 },\n      { offset: 14800 / T, transform: 'scaleX(0)', opacity: 0 },\n      { offset: 15000 / T, transform: 'scaleX(0)', opacity: 1, easing: 'cubic-bezier(.45,0,.2,1)' },\n      { offset: 18500 / T, transform: 'scaleX(1)', opacity: 1 },\n      { offset: 23400 / T, transform: 'scaleX(1)', opacity: 1, easing: 'ease' },\n      { offset: 23850 / T, transform: 'scaleX(1)', opacity: 0 },\n      { offset: 1, transform: 'scaleX(1)', opacity: 0 },\n    ]);\n    // 5 nodes reveal in sequence as the line reaches each\n    for (let i = 0; i < 5; i++) {\n      this.appear('s3n' + i, 15000 + i * 850, 23400, { inDur: 520, s: 0.78, y: 16 });\n    }\n    this.appear('s3cap', 19200, 23400, { inDur: 700, y: 14 });\n\n    // SCENE 4 — why it wins\n    this.appear('s4c0', 24100, 28000, { inDur: 560, s: 0.9, y: 18 });\n    this.appear('s4c1', 24550, 28000, { inDur: 560, s: 0.9, y: 18 });\n    this.appear('s4c2', 25000, 28000, { inDur: 560, s: 0.9, y: 18 });\n    this.appear('s4stat', 25600, 28000, { inDur: 650, y: 20 });\n    this.rawAnim('s4bar', [\n      { offset: 0, transform: 'scaleX(0)' },\n      { offset: this.CNT_START / T, transform: 'scaleX(0)', easing: 'cubic-bezier(.3,.8,.3,1)' },\n      { offset: this.CNT_END / T, transform: 'scaleX(0.5625)' },\n      { offset: 28000 / T, transform: 'scaleX(0.5625)' },\n      { offset: 1, transform: 'scaleX(0.5625)' },\n    ]);\n\n    // SCENE 5 — close (team)\n    this.appear('s5logo', 28500, 32000, { inDur: 700, s: 0.92, y: 16 });\n    this.appear('s5names', 29100, 32000, { inDur: 650, s: 0.92, y: 16 });\n    this.appear('s5foot', 29600, 32000, { inDur: 600, y: 12 });\n\n    // SCENE 6 — sign up (QR) — appears last and HOLDS (no loop)\n    this.appearHold('s6text', 33000, { inDur: 700, y: 20 });\n    this.appearHold('s6qr', 33250, { inDur: 850, s: 0.9, y: 22 });\n\n    // sync every animation to a common origin so scenes line up exactly\n    const t0 = document.timeline.currentTime;\n    this._anims.forEach((a) => { a.startTime = t0; });\n\n    this.tick();\n  }\n\n  replay = () => {\n    if (!this._anims) return;\n    const t0 = document.timeline.currentTime;\n    this._anims.forEach((a) => { try { a.cancel(); } catch (e) {} });\n    this._anims.forEach((a) => { try { a.play(); a.startTime = t0; } catch (e) {} });\n    this.setState({ count: 0 });\n  };\n\n  tick = () => {\n    if (this.refAnim && this.refAnim.currentTime != null) {\n      const tc = Math.min(this.refAnim.currentTime, this.TOTAL);\n      let v;\n      if (tc < this.CNT_START) v = 0;\n      else if (tc > this.CNT_END) v = 9;\n      else v = Math.round(9 * (tc - this.CNT_START) / (this.CNT_END - this.CNT_START));\n      if (v !== this.state.count) this.setState({ count: v });\n    }\n    this._raf = requestAnimationFrame(this.tick);\n  };\n\n  componentDidMount() {\n    this.fit();\n    this._r = () => this.fit();\n    window.addEventListener('resize', this._r);\n    window.addEventListener('load', this._r);\n    if (window.ResizeObserver) {\n      this._ro = new ResizeObserver(() => this.fit());\n      this._ro.observe(document.documentElement);\n    }\n    this.build();\n  }\n\n  componentWillUnmount() {\n    if (this._r) { window.removeEventListener('resize', this._r); window.removeEventListener('load', this._r); }\n    if (this._ro) this._ro.disconnect();\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._fitRetry) cancelAnimationFrame(this._fitRetry);\n  }\n\n  renderVals() {\n    return { stageRef: this.stageRef, count: this.state.count, replay: this.replay };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
